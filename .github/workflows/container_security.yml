name: Container security

on:
  pull_request:
    paths:
      - 'Dockerfile'
      - 'docker/entrypoint.sh'
      - 'server/package.json'
      - 'server/package-lock.json'
      - '.github/workflows/docker_build.yml'
      - '.github/workflows/publish_release.yml'
      - '.github/workflows/container_security.yml'
  push:
    branches:
      - 'main'
    paths:
      - 'Dockerfile'
      - 'docker/entrypoint.sh'
      - 'server/package.json'
      - 'server/package-lock.json'
      - '.github/workflows/docker_build.yml'
      - '.github/workflows/publish_release.yml'
      - '.github/workflows/container_security.yml'
  workflow_call:
    inputs:
      checkout-ref:
        description: Git ref to validate before publishing.
        required: false
        type: string

jobs:
  validate-image:
    name: Validate Docker image
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      IMAGE_NAME: mediatracker-plus-validation
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.checkout-ref || github.sha }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build linux/amd64 validation image
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          platforms: linux/amd64
          provenance: false
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Start smoke test container
        run: |
          docker run -d \
            --name mediatracker-smoke \
            -e SERVER_LANG=en \
            -e TMDB_LANG=en \
            -e AUDIBLE_LANG=us \
            -e TZ=UTC \
            "${IMAGE_NAME}:${IMAGE_TAG}"

      - name: Wait for application to respond
        shell: bash
        run: |
          for attempt in {1..30}; do
            status="$(docker inspect -f '{{if .State.Health}}{{.State.Health.Status}}{{else}}{{.State.Status}}{{end}}' mediatracker-smoke)"

            if [ "${status}" = "healthy" ]; then
              docker exec mediatracker-smoke node -e "require('http').get({host:'127.0.0.1',port:7481,path:'/api/configuration'},(res)=>{res.resume();process.exit(res.statusCode>=200&&res.statusCode<400?0:1);}).on('error',()=>process.exit(1));"
              exit $?
            fi

            if [ "${status}" = "unhealthy" ] || [ "${status}" = "exited" ]; then
              break
            fi

            sleep 2
          done

          echo "Smoke test failed: container did not become healthy"
          exit 1

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          scan-type: image
          format: table
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL

      - name: Print smoke test container logs on failure
        if: failure()
        run: docker logs mediatracker-smoke || true

      - name: Stop smoke test container
        if: always()
        run: docker rm -f mediatracker-smoke || true
