name: Publish release

on:
  release:
    types: [released, prereleased]

jobs:
  release:
    name: Publish release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v6
        with:
          registry-url: 'https://registry.npmjs.org'
      - name: Get version
        id: version
        run: |
          echo "version=$(node -p "require('./server/package.json').version")" >> $GITHUB_OUTPUT
      - name: Validate version
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PACKAGE_VERSION=$(node -p "require('./server/package.json').version")

          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version and package.json version do not match!"
            exit 1
          fi
      - if: ${{ github.event.action == 'prereleased' }}
        name: Publish on npmjs.com [prerelease]
        continue-on-error: true
        run: |
          npm ci
          npm run build
          cp README.md server/README.md
          cd server
          npm publish --tag unstable
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - if: ${{ github.event.action == 'released' }}
        name: Publish on npmjs.com
        continue-on-error: true
        run: |
          npm ci
          npm run build
          cp README.md server/README.md
          cd server
          npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          image: tonistiigi/binfmt:qemu-v10.0.4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - if: ${{ github.event.action == 'prereleased' }}
        name: Publish to Docker Hub [prerelease]
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          push: true
          tags: dnlwttnbrg/mediatracker-plus:${{ steps.version.outputs.version }},dnlwttnbrg/mediatracker-plus:unstable
      - if: ${{ github.event.action == 'released' }}
        name: Publish to Docker Hub
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64, linux/arm64
          push: true
          tags: dnlwttnbrg/mediatracker-plus:${{ steps.version.outputs.version }},dnlwttnbrg/mediatracker-plus:latest
