name: Docker build

on: 'workflow_dispatch'

jobs:
  validate:
    uses: ./.github/workflows/container_security.yml
    with:
      checkout-ref: main

  release:
    name: Docker build
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: main
      - name: Setup node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
      - name: Get version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          version="$(node -p "require('./server/package.json').version")"

          if [ -z "${version}" ]; then
            echo "server/package.json version is empty"
            exit 1
          fi

          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z-]+(\.[0-9A-Za-z-]+)*)?(\+[0-9A-Za-z.-]+)?$ ]]; then
            echo "server/package.json version is not valid semver: ${version}"
            exit 1
          fi

          echo "result=${version}" >> "$GITHUB_OUTPUT"
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4.0.0
        with:
          image: tonistiigi/binfmt:qemu-v8.1.5
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.0.0
      - name: Login to DockerHub
        uses: docker/login-action@v4.0.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Publish to Docker Hub
        uses: docker/build-push-action@v7.0.0
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: guisardo/mediatracker-plus:${{ steps.version.outputs.result }},guisardo/mediatracker-plus:latest
