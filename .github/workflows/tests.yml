name: Tests

on:
  push:
    branches:
      - main
      - dev
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Lint & Type Check
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Build
        run: npm run build
      - name: Verify generated API artifacts
        run: git diff --exit-code -- server/openapi.json rest-api/index.ts
      - name: Verify generated contracts
        run: npm run verify-generated-contracts
      - name: Type check server
        run: npm run check-types --prefix server
      - name: Type check client
        run: npm run check-types --prefix client
      - name: Type check rest-api
        run: npm run check-types --prefix rest-api
      - name: Lint
        run: npm run lint

  test-backend:
    strategy:
      matrix:
        node: ['18', '22', '23']
        os: [ubuntu-22.04, windows-latest]
    runs-on: ${{ matrix.os }}
    name: Backend (${{ matrix.os }}, Node ${{ matrix.node }})
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: 'npm'
      - run: npm ci
      - name: Generate routes
        run: npm run build:routes --prefix server
      - name: Run backend tests
        run: npm run test --prefix server

  test-frontend:
    runs-on: ubuntu-latest
    name: Frontend Tests
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Generate API client
        run: npm run build:routes --prefix server
      - name: Compile Lingui catalogs
        run: npm run lingui:compile --prefix client
      - name: Run frontend tests
        run: npm run test --prefix client

  coverage:
    runs-on: ubuntu-22.04
    name: Coverage
    steps:
      - uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - run: npm ci
      - name: Generate routes
        run: npm run build:routes --prefix server
      - name: Backend test coverage
        run: npm run test:coverage --prefix server
      - name: Compile Lingui catalogs
        run: npm run lingui:compile --prefix client
      - name: Frontend test coverage
        run: npm run test:coverage --prefix client
      - name: Upload backend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: server/coverage/
          retention-days: 7
      - name: Upload frontend coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: client/coverage/
          retention-days: 7

  required-status-check:
    if: ${{ always() }}
    needs:
      - lint
      - test-backend
      - test-frontend
      - coverage
    runs-on: ubuntu-latest
    name: Required Status Check
    steps:
      - name: Fail when any required job failed
        env:
          LINT_RESULT: ${{ needs.lint.result }}
          TEST_BACKEND_RESULT: ${{ needs.test-backend.result }}
          TEST_FRONTEND_RESULT: ${{ needs.test-frontend.result }}
          COVERAGE_RESULT: ${{ needs.coverage.result }}
        run: |
          echo "lint=${LINT_RESULT}"
          echo "test-backend=${TEST_BACKEND_RESULT}"
          echo "test-frontend=${TEST_FRONTEND_RESULT}"
          echo "coverage=${COVERAGE_RESULT}"

          if [ "${LINT_RESULT}" != "success" ] || \
             [ "${TEST_BACKEND_RESULT}" != "success" ] || \
             [ "${TEST_FRONTEND_RESULT}" != "success" ] || \
             [ "${COVERAGE_RESULT}" != "success" ]; then
            echo "One or more required jobs failed."
            exit 1
          fi
